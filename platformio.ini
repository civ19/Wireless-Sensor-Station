[env:freenove_esp32_s3_wroom]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; 1. Tell the hardware file to activate the native USB CDC interface directly
board_build.arduino.memory_type = qio_qspi
board_build.flash_mode = dio

; 2. Enable automated Windows terminal flow control
monitor_dtr = 1
monitor_rts = 1
