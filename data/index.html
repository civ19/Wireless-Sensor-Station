<!DOCTYPE html>
<html>
<head>
    <title>ESP32 Weather Station</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="app.js"></script>
</head>

<body>

    <div class="container">

        <h1>Wireless Sensor Station</h1>

        <div class="card">
            <h2>Temperature</h2>
            <p id="temp">Loading...</p>
        </div>

        <div class="card">
            <h2>Light Level</h2>
            <p id="light">Loading...</p>
        </div>

        <div class="card">
            <h2>Distance</h2>
            <p id="distance">Loading...</p>
        </div>

    </div>

</body>
</html>
